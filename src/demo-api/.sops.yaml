# demo-api recipient file. Unlike a real project — where you'd copy this
# machine's rendered .config/sops/.sops.yaml (see README) — the demo encrypts
# to the committed, intentionally-public keypair in ./demo.agekey so the
# secrets decrypt for anyone who clones this repo, whatever key `install`
# generated for them. Real projects: your machine key + teammates/CI appended,
# comma-separated. Never commit a real private key.
creation_rules:
  - path_regex: \.env(\.sops|\.(json|ya?ml|toml))$
    age: "age1ds0aqdn8hc4gtx63pa5g9qdptn74w4uh4zv48g7xrmfl4fjgqggq5ls9at"
